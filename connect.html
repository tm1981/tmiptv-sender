<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPTV Setup</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0; padding: 24px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f0eb; color: #1a1a2e; min-height: 100vh;
}
h1   { font-size: 22px; margin: 0 0 6px; color: #7b341e; }
.sub { font-size: 14px; color: #666; margin: 0 0 20px; }

#statusWrap { margin-bottom: 20px; }
#statusMsg  {
    padding: 12px 16px; border-radius: 10px; font-size: 14px;
    background: #fff3cd; color: #856404;
}
#statusMsg.ok  { background: #e8f4e8; color: #2d6a2d; }
#statusMsg.err { background: #fce8e8; color: #8b1a1a; }

#form { display: none; }
label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #333; }
.field { margin-bottom: 16px; }
input {
    width: 100%; padding: 12px 14px; font-size: 16px;
    border: 1.5px solid #ccc; border-radius: 10px;
    outline: none; background: #fff; transition: border-color .2s;
}
input:focus { border-color: #d98952; }
button {
    width: 100%; padding: 14px; font-size: 17px; font-weight: 700;
    color: #fff; background: #d98952; border: none; border-radius: 12px;
    cursor: pointer; margin-top: 4px;
}
button:disabled { background: #ccc; cursor: default; }
</style>
</head>
<body>

<h1>IPTV Setup</h1>
<p class="sub">Enter your Xtream Code credentials to connect the TV.</p>

<div id="statusWrap">
    <div id="statusMsg">Ready. Fill in your credentials below.</div>
</div>

<form id="form">
    <div class="field">
        <label for="server">Server URL</label>
        <input type="url" id="server" name="server"
               placeholder="http://yourserver.com:8080" required/>
    </div>
    <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               autocomplete="username" required/>
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" required/>
    </div>
    <button type="submit" id="submitBtn">Send to TV</button>
</form>

<script>
(function () {
    var NTFY_BASE = 'https://ntfy.sh/';

    var statusEl  = document.getElementById('statusMsg');
    var formEl    = document.getElementById('form');
    var submitBtn = document.getElementById('submitBtn');

    function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className   = type || '';
    }

    function b64urlEncode(bytes) {
        var s = '';
        for (var i = 0; i < bytes.length; i++) { s += String.fromCharCode(bytes[i]); }
        return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function b64urlDecode(str) {
        str = str.replace(/-/g, '+').replace(/_/g, '/');
        while (str.length % 4) { str += '='; }
        var s = atob(str);
        var bytes = new Uint8Array(s.length);
        for (var i = 0; i < s.length; i++) { bytes[i] = s.charCodeAt(i); }
        return bytes;
    }

    // Topic comes from ?topic=... (sent to server)
    // Key comes from #k=...     (stays on the client — never sent to ntfy/github)
    var params = new URLSearchParams(window.location.search);
    var topic  = params.get('topic');

    var keyB64 = null;
    var hash = window.location.hash || '';
    if (hash.indexOf('#') === 0) { hash = hash.substring(1); }
    var hashParams = new URLSearchParams(hash);
    keyB64 = hashParams.get('k');

    if (!topic || !keyB64) {
        setStatus('Missing topic or key in URL. Please scan the QR code on your TV again.', 'err');
        return;
    }

    formEl.style.display = 'block';

    formEl.addEventListener('submit', function (e) {
        e.preventDefault();

        var creds = {
            server:   document.getElementById('server').value.trim(),
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value.trim()
        };

        submitBtn.disabled = true;
        setStatus('Encrypting\u2026');

        var keyBytes;
        try { keyBytes = b64urlDecode(keyB64); }
        catch (err) {
            submitBtn.disabled = false;
            setStatus('Bad key in URL. Rescan the TV QR code.', 'err');
            return;
        }

        var iv = window.crypto.getRandomValues(new Uint8Array(12));
        var plaintext = new TextEncoder().encode(JSON.stringify(creds));

        window.crypto.subtle.importKey(
            'raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt']
        ).then(function (key) {
            return window.crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv }, key, plaintext
            );
        }).then(function (ctBuf) {
            var envelope = {
                iv: b64urlEncode(iv),
                ct: b64urlEncode(new Uint8Array(ctBuf))
            };
            setStatus('Sending to TV\u2026');
            return fetch(NTFY_BASE + encodeURIComponent(topic), {
                method: 'POST',
                body: JSON.stringify(envelope)
            });
        }).then(function (res) {
            if (!res.ok) { throw new Error('HTTP ' + res.status); }
            setStatus('Sent! Check your TV.', 'ok');
        }).catch(function (err) {
            submitBtn.disabled = false;
            setStatus('Could not send: ' + (err.message || err), 'err');
        });
    });
}());
</script>
</body>
</html>
